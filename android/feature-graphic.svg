<?xml version="1.0" encoding="UTF-8"?>
<!--
  BuddyAlly Play Store feature graphic — 1024×500.
  Open this in any browser, screenshot at 100% zoom, crop to 1024×500.
  OR: open in Figma/Sketch/Inkscape and export as PNG at 1× scale.
  OR (cleanest): in Chrome, right-click → "Save Image As…" usually
  doesn't work for SVG, so use a Mac terminal trick:
    qlmanage -t -s 1024 -o ~/Desktop ~/Documents/Claude/Projects/buddyally-next/android/feature-graphic.svg
  → produces feature-graphic.svg.png on your Desktop, ready to upload.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Background — brand sky-blue with subtle radial accent for depth -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3293cb"/>
      <stop offset="60%" stop-color="#197bb8"/>
      <stop offset="100%" stop-color="#0652b7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft drop shadow for the device mockups -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow)"/>

  <!-- Subtle dotted texture overlay (gives the bg some grain) -->
  <g opacity="0.06" fill="#ffffff">
    <!-- A scatter of small circles, no need to be perfect -->
    <circle cx="80"  cy="60"  r="2"/>
    <circle cx="180" cy="140" r="1.5"/>
    <circle cx="60"  cy="320" r="2"/>
    <circle cx="140" cy="420" r="1"/>
    <circle cx="240" cy="380" r="1.5"/>
    <circle cx="900" cy="60"  r="2"/>
    <circle cx="980" cy="140" r="1.5"/>
    <circle cx="850" cy="40"  r="1"/>
  </g>

  <!-- ─── Left column: wordmark + tagline ─── -->
  <g transform="translate(60, 0)">
    <!-- Wordmark: "buddy" white, "ally" lighter -->
    <text x="0" y="220"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif"
          font-weight="950" font-size="118" letter-spacing="-7" fill="#ffffff">
      buddy<tspan fill="#bce0f4">ally</tspan>
    </text>

    <!-- Tagline -->
    <text x="2" y="290"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif"
          font-weight="600" font-size="28" letter-spacing="-0.5" fill="#ffffff" opacity="0.95">
      Find your people. Do more together.
    </text>

    <!-- Sub-pitch -->
    <text x="2" y="335"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif"
          font-weight="500" font-size="18" fill="#dbeefb" letter-spacing="-0.2">
      Local rides · activities · trusted neighbors
    </text>

    <!-- Tiny pill: "Available now in Atlanta · Lagos · Abuja" -->
    <g transform="translate(2, 380)">
      <rect x="0" y="0" rx="22" ry="22" width="380" height="38" fill="#ffffff" opacity="0.16"/>
      <text x="22" y="25"
            font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif"
            font-weight="700" font-size="14" fill="#ffffff" letter-spacing="0.3">
        ATLANTA · LAGOS · ABUJA · AND GROWING
      </text>
    </g>
  </g>

  <!-- ─── Right column: stylized phone mockup with sample activity card ─── -->
  <g transform="translate(700, 70) rotate(-6 100 180)">
    <!-- Phone frame -->
    <rect x="0" y="0" rx="38" ry="38" width="200" height="360"
          fill="#0a1c2c" filter="url(#cardShadow)"/>
    <!-- Screen -->
    <rect x="10" y="10" rx="30" ry="30" width="180" height="340" fill="#f4f5f7"/>

    <!-- Top bar -->
    <rect x="20" y="22" width="60" height="8" rx="4" fill="#3293cb"/>
    <circle cx="170" cy="26" r="5" fill="#cbd5e1"/>

    <!-- "Buddy Pulse" pill -->
    <rect x="20" y="48" rx="9" ry="9" width="92" height="18" fill="#eaf6fc"/>
    <circle cx="32" cy="57" r="3" fill="#3293cb"/>
    <text x="42" y="61"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-weight="800" font-size="9" fill="#197bb8" letter-spacing="0.5">BUDDY PULSE</text>

    <!-- Activity card -->
    <rect x="20" y="78" rx="14" ry="14" width="160" height="132" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <rect x="20" y="78" rx="14" ry="14" width="160" height="58" fill="#3293cb"/>
    <text x="32" y="115"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-weight="900" font-size="13" fill="#ffffff" letter-spacing="-0.3">Lekki → Ikeja</text>
    <text x="32" y="129"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-weight="500" font-size="9" fill="#dbeefb">Heading out in 15 · 2 seats open</text>

    <rect x="32" y="150" rx="6" ry="6" width="100" height="6" fill="#cbd5e1"/>
    <rect x="32" y="162" rx="6" ry="6" width="80" height="6" fill="#e5e7eb"/>
    <rect x="32" y="184" rx="10" ry="10" width="56" height="18" fill="#3293cb"/>
    <text x="60" y="196" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
          font-weight="800" font-size="9" fill="#ffffff">JOIN</text>

    <!-- Lower cards (skeleton) -->
    <rect x="20" y="220" rx="10" ry="10" width="160" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="38" cy="240" r="10" fill="#eaf6fc"/>
    <rect x="56" y="232" rx="3" ry="3" width="80" height="6" fill="#374151"/>
    <rect x="56" y="244" rx="3" ry="3" width="60" height="5" fill="#94a3b8"/>

    <rect x="20" y="270" rx="10" ry="10" width="160" height="40" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <circle cx="38" cy="290" r="10" fill="#fef3c7"/>
    <rect x="56" y="282" rx="3" ry="3" width="80" height="6" fill="#374151"/>
    <rect x="56" y="294" rx="3" ry="3" width="60" height="5" fill="#94a3b8"/>

    <!-- Bottom nav dots -->
    <circle cx="60"  cy="335" r="4" fill="#3293cb"/>
    <circle cx="100" cy="335" r="4" fill="#cbd5e1"/>
    <circle cx="140" cy="335" r="4" fill="#cbd5e1"/>
  </g>
</svg>
